<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test Studio - Soins à Domicile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            line-height: 1.5;
            padding: 24px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .header h1 { font-size: 1.25rem; font-weight: 600; color: #0f172a; }
        .header p { font-size: 0.75rem; color: #64748b; margin-top: 6px; }
        
        .main-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
        }
        
        .sidebar {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            height: fit-content;
            position: sticky;
            top: 24px;
        }
        
        .service-group {
            border-bottom: 1px solid #e2e8f0;
        }
        
        .service-header {
            padding: 14px 18px;
            background: #f8fafc;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            color: #1e293b;
            border-left: 3px solid transparent;
        }
        
        .service-header:hover {
            background: #f1f5f9;
            border-left-color: #3b82f6;
        }
        
        .endpoint-list {
            list-style: none;
            display: block;
        }
        
        .endpoint-list li {
            padding: 10px 18px 10px 34px;
            font-size: 0.7rem;
            font-family: 'Source Code Pro', monospace;
            cursor: pointer;
            border-left: 2px solid transparent;
            color: #475569;
        }
        
        .endpoint-list li:hover {
            background: #f8fafc;
            border-left-color: #3b82f6;
            color: #1e293b;
        }
        
        .endpoint-list li.active {
            background: #eff6ff;
            border-left-color: #3b82f6;
            color: #1e40af;
            font-weight: 500;
        }
        
        .panel {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        
        .request-bar {
            padding: 20px 24px;
            background: #fafcff;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .method {
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 0.3px;
        }
        
        .method.GET { background: #dcfce7; color: #166534; }
        .method.POST { background: #dbeafe; color: #1e40af; }
        .method.PUT { background: #fef3c7; color: #854d0e; }
        .method.DELETE { background: #fee2e2; color: #991b1b; }
        
        .url-input {
            flex: 1;
            font-family: 'Source Code Pro', monospace;
            font-size: 0.75rem;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #ffffff;
            color: #0f172a;
        }
        
        .url-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.1);
        }
        
        .send-btn {
            background: #3b82f6;
            border: none;
            padding: 8px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .send-btn:hover { background: #2563eb; }
        
        .test-buttons {
            padding: 12px 24px;
            display: flex;
            gap: 12px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .test-btn {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            color: #475569;
            transition: all 0.2s;
        }
        
        .test-btn:hover {
            background: #f1f5f9;
            border-color: #3b82f6;
            color: #3b82f6;
        }
        
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 24px;
        }
        
        .tab {
            padding: 12px 20px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            color: #64748b;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .tab.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }
        
        .tab-content {
            display: none;
            padding: 24px;
        }
        
        .tab-content.active {
            display: block;
        }
        
        textarea {
            width: 100%;
            min-height: 280px;
            background: #fefefe;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            color: #0f172a;
            font-family: 'Source Code Pro', monospace;
            font-size: 0.7rem;
            padding: 12px;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .param-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .param-row input {
            flex: 1;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            padding: 8px 12px;
            border-radius: 6px;
            color: #0f172a;
            font-size: 0.7rem;
            font-family: 'Source Code Pro', monospace;
        }
        
        .param-row input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .remove-btn {
            background: #fee2e2;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            color: #991b1b;
            font-size: 0.7rem;
            font-weight: 500;
        }
        
        .remove-btn:hover {
            background: #fecaca;
        }
        
        .add-btn {
            background: none;
            border: 1px dashed #cbd5e1;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
            color: #3b82f6;
            margin-top: 8px;
            transition: all 0.2s;
        }
        
        .add-btn:hover {
            background: #eff6ff;
            border-color: #3b82f6;
        }
        
        .response-status {
            font-size: 0.7rem;
            font-weight: 500;
            padding: 14px 24px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            color: #475569;
        }
        
        .response-pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
            font-family: 'Source Code Pro', monospace;
            font-size: 0.7rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
            margin: 20px;
            border-radius: 8px;
            max-height: 500px;
        }
        
        .response-pre.success {
            border-left: 4px solid #22c55e;
        }
        
        .response-pre.error {
            background: #fef2f2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }
        
        footer {
            text-align: center;
            padding: 24px;
            font-size: 0.7rem;
            color: #64748b;
            border-top: 1px solid #e2e8f0;
            margin-top: 32px;
            background: #ffffff;
            border-radius: 12px;
        }
        
        @media (max-width: 800px) {
            .main-grid { grid-template-columns: 1fr; }
            .sidebar { position: static; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>API Test Studio - Soins à Domicile</h1>
        <p>Projet 6 · ENSAM Rabat · Architecture Microservices</p>
    </div>
    
    <div class="main-grid">
        <div class="sidebar" id="sidebar"></div>
        
        <div class="panel">
            <div class="request-bar">
                <span class="method" id="methodLabel">GET</span>
                <input type="text" class="url-input" id="urlInput" placeholder="http://localhost:8081/patients">
                <button class="send-btn" id="sendBtn">Send Request</button>
            </div>
            <div class="test-buttons">
                <button class="test-btn" id="testEurekaBtn">Test Eureka Server (8761)</button>
                <button class="test-btn" id="testPatientBtn">Test Patient Service (8081)</button>
            </div>
            
            <div class="tabs">
                <div class="tab active" data-tab="body">Body (JSON)</div>
                <div class="tab" data-tab="params">Query Parameters</div>
                <div class="tab" data-tab="headers">Headers</div>
            </div>
            
            <div class="tab-content active" id="tab-body">
                <textarea id="bodyText" placeholder='{
  "key": "value"
}'></textarea>
            </div>
            <div class="tab-content" id="tab-params">
                <div id="paramsContainer"></div>
                <button class="add-btn" id="addParamBtn">+ Add Parameter</button>
            </div>
            <div class="tab-content" id="tab-headers">
                <div id="headersContainer"></div>
                <button class="add-btn" id="addHeaderBtn">+ Add Header</button>
            </div>
            
            <div class="response-status" id="responseStatus">No request sent</div>
            <pre id="responsePre" class="response-pre">// Select an endpoint from the left panel
// Click Send Request to execute</pre>
        </div>
    </div>
    
    <footer>
        <strong>Projet 6 — ENSAM Rabat</strong> | Costo Aya &amp; Lagribi Abdelilah | Pr. A. El Qadi
    </footer>
</div>

<script>
    const services = [
        {
            name: "Patient Service (8081)",
            base: "http://localhost:8081",
            endpoints: [
                { method: "GET", path: "/patients", name: "List all patients" },
                { method: "POST", path: "/patients", name: "Create patient", body: '{\n  "nom": "Benali",\n  "prenom": "Hassan",\n  "dateNaissance": "1950-03-15",\n  "telephone": "0661234567",\n  "email": "hassan.benali@email.com",\n  "adresse": "12 Rue Mohamed V, Casablanca"\n}' },
                { method: "GET", path: "/patients/1", name: "Get patient by ID (1)" },
                { method: "PUT", path: "/patients/1", name: "Update patient (ID 1)", body: '{\n  "nom": "Benali",\n  "prenom": "Hassan",\n  "niveauDependance": "TRES_DEPENDANT"\n}' },
                { method: "DELETE", path: "/patients/1", name: "Delete patient (ID 1)" }
            ]
        },
        {
            name: "Caregiver Service (8082)",
            base: "http://localhost:8082",
            endpoints: [
                { method: "GET", path: "/caregivers", name: "List all caregivers" },
                { method: "POST", path: "/caregivers", name: "Create caregiver", body: '{\n  "nom": "Amrani",\n  "prenom": "Sara",\n  "typeSoignant": "INFIRMIER",\n  "telephone": "0671234567",\n  "email": "sara@soins.ma"\n}' },
                { method: "GET", path: "/caregivers/available", name: "Get available caregivers" },
                { method: "GET", path: "/caregivers/1", name: "Get caregiver by ID (1)" }
            ]
        },
        {
            name: "Visit Optimization (8083)",
            base: "http://localhost:8083",
            endpoints: [
                { method: "GET", path: "/visits/distance", name: "Calculate Haversine distance", params: [{key:"lat1",value:"33.5731"},{key:"lon1",value:"-7.5898"},{key:"lat2",value:"33.5900"},{key:"lon2",value:"-7.6100"}] },
                { method: "POST", path: "/visits/optimize/1", name: "Optimize tour", body: '[\n  {"patientId":1,"caregiverId":1,"date":"2026-04-20","dureeMinutes":30}\n]' }
            ]
        },
        {
            name: "Tracking Service (8084)",
            base: "http://localhost:8084",
            endpoints: [
                { method: "GET", path: "/tracking/visits/active", name: "Get active visits" },
                { method: "PUT", path: "/tracking/visits/1/status", name: "Update visit status", body: '{\n  "statut": "EN_ROUTE",\n  "latitude": 33.5850,\n  "longitude": -7.6200\n}' }
            ]
        },
        {
            name: "Billing Service (8085)",
            base: "http://localhost:8085",
            endpoints: [
                { method: "GET", path: "/billing", name: "List all invoices" },
                { method: "POST", path: "/billing", name: "Create invoice", body: '{\n  "patientId": 1,\n  "caregiverId": 1,\n  "montantBrut": 150.00\n}' },
                { method: "GET", path: "/billing/patient/1", name: "Get invoices by patient (ID 1)" }
            ]
        },
        {
            name: "Health Checks",
            base: "",
            endpoints: [
                { method: "GET", path: "http://localhost:8761/actuator/health", name: "Eureka Server Health" },
                { method: "GET", path: "http://localhost:8081/actuator/health", name: "Patient Service Health" },
                { method: "GET", path: "http://localhost:8082/actuator/health", name: "Caregiver Service Health" },
                { method: "GET", path: "http://localhost:8083/actuator/health", name: "Optimization Service Health" },
                { method: "GET", path: "http://localhost:8084/actuator/health", name: "Tracking Service Health" },
                { method: "GET", path: "http://localhost:8085/actuator/health", name: "Billing Service Health" }
            ]
        }
    ];

    let currentParams = [];
    let currentHeaders = [{"key":"Content-Type","value":"application/json"}];
    
    function buildSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = '';
        
        services.forEach(service => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'service-group';
            
            const headerDiv = document.createElement('div');
            headerDiv.className = 'service-header';
            headerDiv.innerHTML = `<span>${service.name}</span><span>▼</span>`;
            
            let expanded = true;
            const endpointsUl = document.createElement('ul');
            endpointsUl.className = 'endpoint-list';
            
            service.endpoints.forEach(ep => {
                const li = document.createElement('li');
                li.textContent = `${ep.method}  ${ep.name}`;
                li.onclick = () => {
                    document.querySelectorAll('.endpoint-list li').forEach(l => l.classList.remove('active'));
                    li.classList.add('active');
                    loadEndpoint(service, ep);
                };
                endpointsUl.appendChild(li);
            });
            
            headerDiv.onclick = () => {
                expanded = !expanded;
                endpointsUl.style.display = expanded ? 'block' : 'none';
                headerDiv.querySelector('span:last-child').textContent = expanded ? '▼' : '▶';
            };
            
            groupDiv.appendChild(headerDiv);
            groupDiv.appendChild(endpointsUl);
            sidebar.appendChild(groupDiv);
        });
    }
    
    function loadEndpoint(service, ep) {
        const fullUrl = ep.path.startsWith('http') ? ep.path : service.base + ep.path;
        document.getElementById('urlInput').value = fullUrl;
        document.getElementById('methodLabel').textContent = ep.method;
        document.getElementById('methodLabel').className = `method ${ep.method}`;
        document.getElementById('bodyText').value = ep.body || '';
        currentParams = (ep.params || []).map(p => ({key: p.key, value: p.value}));
        renderParams();
        renderHeaders();
    }
    
    function renderParams() {
        const container = document.getElementById('paramsContainer');
        container.innerHTML = '';
        
        currentParams.forEach((param, idx) => {
            const row = document.createElement('div');
            row.className = 'param-row';
            row.innerHTML = `
                <input type="text" placeholder="Parameter name" value="${escapeHtml(param.key)}" data-idx="${idx}" data-type="key">
                <input type="text" placeholder="Parameter value" value="${escapeHtml(param.value)}" data-idx="${idx}" data-type="value">
                <button class="remove-btn" data-remove="${idx}">Remove</button>
            `;
            container.appendChild(row);
        });
        
        attachParamEvents();
    }
    
    function renderHeaders() {
        const container = document.getElementById('headersContainer');
        container.innerHTML = '';
        
        currentHeaders.forEach((header, idx) => {
            const row = document.createElement('div');
            row.className = 'param-row';
            row.innerHTML = `
                <input type="text" placeholder="Header name" value="${escapeHtml(header.key)}" data-idx="${idx}" data-type="key">
                <input type="text" placeholder="Header value" value="${escapeHtml(header.value)}" data-idx="${idx}" data-type="value">
                <button class="remove-btn" data-remove="${idx}">Remove</button>
            `;
            container.appendChild(row);
        });
        
        attachHeaderEvents();
    }
    
    function attachParamEvents() {
        document.querySelectorAll('#paramsContainer input').forEach(inp => {
            inp.addEventListener('change', (e) => {
                const idx = parseInt(inp.dataset.idx);
                if (inp.dataset.type === 'key') {
                    currentParams[idx].key = inp.value;
                } else {
                    currentParams[idx].value = inp.value;
                }
            });
        });
        
        document.querySelectorAll('#paramsContainer .remove-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.remove);
                currentParams.splice(idx, 1);
                renderParams();
            });
        });
    }
    
    function attachHeaderEvents() {
        document.querySelectorAll('#headersContainer input').forEach(inp => {
            inp.addEventListener('change', (e) => {
                const idx = parseInt(inp.dataset.idx);
                if (inp.dataset.type === 'key') {
                    currentHeaders[idx].key = inp.value;
                } else {
                    currentHeaders[idx].value = inp.value;
                }
            });
        });
        
        document.querySelectorAll('#headersContainer .remove-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.remove);
                currentHeaders.splice(idx, 1);
                renderHeaders();
            });
        });
    }
    
    function escapeHtml(str) {
        return String(str || '').replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function buildUrlWithParams(baseUrl, params) {
        let url = baseUrl;
        const validParams = params.filter(p => p.key && p.key.trim());
        
        if (validParams.length > 0) {
            const queryString = validParams.map(p => `${encodeURIComponent(p.key)}=${encodeURIComponent(p.value)}`).join('&');
            url += (url.includes('?') ? '&' : '?') + queryString;
        }
        
        return url;
    }
    
async function sendRequest() {
    const rawUrl = document.getElementById('urlInput').value.trim();
    const method = document.getElementById('methodLabel').textContent;
    const bodyTextValue = document.getElementById('bodyText').value;

    const finalUrl = buildUrlWithParams(rawUrl, currentParams);

    const headers = {};
    currentHeaders.forEach(h => {
        if (h.key && h.key.trim()) {
            headers[h.key] = h.value;
        }
    });

    const responseStatus = document.getElementById('responseStatus');
    const iframe = document.getElementById('responseFrame');

    responseStatus.textContent = 'Sending request...';

    try {
        const fetchOptions = { method, headers };

        if (method !== 'GET' && method !== 'DELETE' && bodyTextValue && bodyTextValue.trim()) {
            fetchOptions.body = bodyTextValue;
        }

        const response = await fetch(finalUrl, fetchOptions);

        let data;
        const contentType = response.headers.get("content-type");

        if (contentType && contentType.includes("application/json")) {
            data = JSON.stringify(await response.json(), null, 2);
        } else {
            data = await response.text();
        }

        // 👉 Affichage dans iframe (page blanche stylée)
        iframe.srcdoc = `
        <html>
        <head>
            <style>
                body {
                    font-family: monospace;
                    background: #0f172a;
                    color: #e2e8f0;
                    padding: 16px;
                }
                .status {
                    color: ${response.ok ? "#22c55e" : "#ef4444"};
                    margin-bottom: 10px;
                    font-weight: bold;
                }
                pre {
                    white-space: pre-wrap;
                    word-wrap: break-word;
                }
            </style>
        </head>
        <body>
            <div class="status">
                HTTP ${response.status} ${response.statusText}
            </div>
            <pre>${escapeHtml(data)}</pre>
        </body>
        </html>
        `;

        responseStatus.textContent = `${response.status} ${response.statusText} — ${finalUrl}`;

    } catch (error) {
        responseStatus.textContent = `Error: ${error.message}`;

        iframe.srcdoc = `
        <html>
        <body style="font-family: monospace; background:#111; color:red; padding:20px;">
            <h3>Request Failed</h3>
            <p>${error.message}</p>
            <p>${finalUrl}</p>
        </body>
        </html>
        `;
    }
}

    async function testService(url, name) {
        const responseStatus = document.getElementById('responseStatus');
        const responsePre = document.getElementById('responsePre');
        
        responseStatus.textContent = `Testing ${name}...`;
        responsePre.textContent = '// Testing connection...';
        responsePre.classList.remove('success', 'error');
        
        try {
            const response = await fetch(url, { mode: 'cors' });
            
            if (response.ok) {
                responseStatus.textContent = `${name} - Status: ${response.status} ${response.statusText}`;
                responsePre.innerHTML = `Service ${name} is operational.\n\nURL: ${url}\nStatus: ${response.status} ${response.statusText}`;
                responsePre.classList.add('success');
                return true;
            } else {
                responseStatus.textContent = `${name} - Error: ${response.status} ${response.statusText}`;
                responsePre.innerHTML = `Service ${name} returned error.\n\nURL: ${url}\nStatus: ${response.status} ${response.statusText}`;
                responsePre.classList.add('error');
                return false;
            }
        } catch (error) {
            responseStatus.textContent = `${name} - Connection failed`;
            responsePre.innerHTML = `Cannot reach ${name}\n\nURL: ${url}\nError: ${error.message}\n\nPlease verify that the service is running.`;
            responsePre.classList.add('error');
            return false;
        }
    }
    
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
        });
    });
    
    // Event listeners
    document.getElementById('sendBtn').addEventListener('click', sendRequest);
    document.getElementById('addParamBtn').addEventListener('click', () => {
        currentParams.push({key: "", value: ""});
        renderParams();
    });
    document.getElementById('addHeaderBtn').addEventListener('click', () => {
        currentHeaders.push({key: "", value: ""});
        renderHeaders();
    });
    document.getElementById('testEurekaBtn').addEventListener('click', () => testService('http://localhost:8761/actuator/health', 'Eureka Server'));
    document.getElementById('testPatientBtn').addEventListener('click', () => testService('http://localhost:8081/actuator/health', 'Patient Service'));
    
    // Initialize
    buildSidebar();
    if (services[0] && services[0].endpoints[0]) {
        loadEndpoint(services[0], services[0].endpoints[0]);
    }
</script>
