server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: patient-home-service
          uri: lb://patient-home-service
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=1

        - id: caregiver-scheduling-service
          uri: lb://caregiver-scheduling-service
          predicates:
            - Path=/api/caregivers/**
          filters:
            - StripPrefix=1

        - id: visit-optimization-service
          uri: lb://visit-optimization-service
          predicates:
            - Path=/api/visits/**
          filters:
            - StripPrefix=1

        - id: real-time-tracking-service
          uri: lb://real-time-tracking-service
          predicates:
            - Path=/api/tracking/**
          filters:
            - StripPrefix=1

        - id: billing-reconciliation-service
          uri: lb://billing-reconciliation-service
          predicates:
            - Path=/api/billing/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,routes
